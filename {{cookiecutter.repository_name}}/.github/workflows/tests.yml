# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Run Tests

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ master ]

jobs:
  lint:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: [3.14]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package
      run: pip install invoke .[dev]
    - name: invoke lint
      run: invoke lint


  docs:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package
      run: pip install .[dev]
    - name: make docs
      run: make docs


  readme:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package and dependencies
      run: pip install invoke rundoc .
    - name: invoke readme
      run: invoke readme


  unit:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package and dependencies
      run: pip install invoke .[test]
    - name: invoke unit
      run: invoke unit

{%- if cookiecutter.use_codecov_with_ci == 'y' %}
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v1
      with:
        file: ./coverage.xml
{%- endif %}


  minimum:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package and dependencies
      run: pip install invoke .[test]
    - name: invoke minimum
      run: invoke minimum


  tutorials:
    runs-on: {{ '${{ matrix.os }}' }}
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v1
    - name: Set up Python {{ '${{ matrix.python-version }}' }}
      uses: actions/setup-python@v2
      with:
        python-version: {{ '${{ matrix.python-version }}' }}
    - name: Install package and dependencies
      run: pip install invoke jupyter matplotlib .
    - name: invoke tutorials
      run: invoke tutorials

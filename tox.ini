[tox]
envlist = py310, py311, py312, py313, py314
skipsdist = true

[travis]
python =
    3.14: py314
    3.13: py313
    3.12: py312
    3.11: py311
    3.10: py310

[testenv:docs]
basepython=python
changedir=docs
deps=sphinx
commands=
    sphinx-build -b html -d {envtmpdir}/doctrees . {envtmpdir}/html

[testenv]
setenv =
    PYTHONPATH = {toxinidir}
deps =
    -r{toxinidir}/requirements_dev.txt
commands =
    pip install -U pip
    py.test
